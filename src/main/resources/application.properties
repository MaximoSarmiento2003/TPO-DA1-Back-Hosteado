spring.application.name=tpoDA

# === Base de datos ===
# En Render: se completa con las variables de entorno que configures en el dashboard.
# En local: si no definis las variables de entorno, usa los valores por defecto de abajo
#           (ajusta esos defaults a tu Postgres local).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/subastas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# === Puerto ===
# Render inyecta la variable PORT; en local cae a 8080
server.port=${PORT:8080}

# === JWT ===
application.security.jwt.secretKey=${JWT_SECRET:MiSuperClaveSecreta123456789012345678901234567890}
application.security.jwt.expiration=${JWT_EXPIRATION:3600000}

# === Mail ===
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:auctionpro.tpo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jgmt utun uufz tohw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# URL base del front para armar el link del mail
app.frontend.url=${FRONTEND_URL:http://192.168.0.56:8081}
