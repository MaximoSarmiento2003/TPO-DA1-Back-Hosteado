spring.application.name=tpoDA

# === Base de datos ===
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/subastas?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# === Puerto ===
server.port=${PORT:8080}

# === JWT ===
application.security.jwt.secretKey=${JWT_SECRET:dev-secret-key}
application.security.jwt.expiration=${JWT_EXPIRATION:3600000}

# === Mail ===
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:auctionpro.tpo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# === Frontend ===
app.frontend.url=${FRONTEND_URL:http://localhost:8081}
